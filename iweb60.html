<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>網站資訊設定</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background: #f9f9f9;
      padding: 20px;
      line-height: 1.6;
    }
    h2 {
      border-left: 5px solid #333;
      padding-left: 10px;
      color: #333;
    }
    .section {
      background: white;
      border: 1px solid #ddd;
      padding: 20px;
      margin-bottom: 30px;
      border-radius: 5px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    .button-group {
      margin-top: 20px;
    }
    .button-group button {
      padding: 10px 20px;
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .button-group button:hover {
      background-color: #004999;
    }
  </style>
</head>
<body>

  <h2>網站資訊設定</h2>

  <div class="section">
    <h3>頁腳資訊</h3>
    <label>客服電話</label>
    <input type="text" placeholder="例如：02-12345678">

    <label>聯絡信箱</label>
    <input type="email" placeholder="example@mail.com">

    <label>聯絡時間</label>
    <input type="text" placeholder="例如：週一至五 9:00-18:00">
  </div>

  <div class="section">
    <h3>信箱設定</h3>
    <label>系統信箱一</label>
    <input type="email">

    <label>系統信箱二</label>
    <input type="email">
  </div>

  <div class="section">
    <h3>LINE 設定</h3>
    <label>LINE ID</label>
    <input type="text">

    <label>LINE QR Code 圖片上傳</label>
    <input type="file">
  </div>

  <div class="section">
    <h3>社群分享設定</h3>
    <label>社群分享標題</label>
    <input type="text">

    <label>社群分享描述</label>
    <textarea rows="3"></textarea>

    <label>社群分享縮圖</label>
    <input type="file">
  </div>

  <div class="button-group">
    <button type="submit">儲存設定</button>
  </div>

</body>
</html>
